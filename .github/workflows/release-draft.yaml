name: Release Drafter

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'q1/spring-boot-4'
  pull_request:
    types: [opened, reopened, synchronize]

env:
  publish: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/q1/spring-boot-4') && !startsWith(github.ref, 'refs/dependabot') }}

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  build-release:
    name: "Build and release package"
    uses: navikt/bidrag-workflow/.github/workflows/maven_release_drafter.yaml@main
    secrets: inherit
    with:
      publish: true
      suffix: "-SB4"